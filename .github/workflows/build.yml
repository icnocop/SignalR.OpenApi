name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publishNuGet:
        description: 'Publish NuGet packages to NuGet.org'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Set version
      shell: pwsh
      run: |
        $majorVersion = 1
        $minorVersion = 0
        $firstBuildYear = 2026
        $currentDate = (Get-Date).ToUniversalTime()
        $buildYear = [int]$currentDate.ToString("yyyy")
        $currentMonthDay = $currentDate.ToString("MMdd")
        $buildVersion = (($buildYear - $firstBuildYear) * 1200) + [int]$currentMonthDay
        $version = "$majorVersion.$minorVersion.$buildVersion.${{ github.run_number }}"
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf-8 -Append
        Write-Host "Version: $version"

    - name: Restore
      run: dotnet restore SignalR.OpenApi.slnx

    - name: Build
      run: dotnet build SignalR.OpenApi.slnx --configuration Release --no-restore /p:Version=${{ env.VERSION }}

    - name: Test
      run: dotnet test SignalR.OpenApi.slnx --configuration Release --no-build --verbosity normal --filter "TestCategory!=Playwright"

    - name: Pack
      run: dotnet pack SignalR.OpenApi.slnx --configuration Release --no-build -o ./artifacts /p:Version=${{ env.VERSION }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SignalR.OpenApi.${{ env.VERSION }}.zip
        path: ./artifacts/*.nupkg

    - name: Publish to NuGet
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.publishNuGet == 'true'
      run: |
        dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
        git tag v${{ env.VERSION }}
        git push origin v${{ env.VERSION }}

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.publishNuGet == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ env.VERSION }}
        tag_name: v${{ env.VERSION }}
        generate_release_notes: true
        draft: true
        prerelease: false
        files: ./artifacts/*.nupkg
